name: ML Model CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r E:\ZC\YEAR 4 S2\DSAI 406\Assignment 4\assignment-4-mlops\requirements.txt

      - name: Linter Check
        run: python -m pip install flake8 && flake8 .

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

      - name: Upload README artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md