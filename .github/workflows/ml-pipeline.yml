name: ML Model CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --index-url https://pypi.org/simple flake8==7.1.1

      - name: Linter Check
        run: flake8 .

      - name: Model Dry Test
        run: python -c "import torch; print('Model environment ready!')"

      - name: Upload README artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md